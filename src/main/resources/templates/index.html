<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encurtador de Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0a0f1e;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            top: -100px; left: -100px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            pointer-events: none;
        }
        .container { width: 100%; max-width: 560px; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 2.5rem; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.3);
            color: #60a5fa;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 50px;
            margin-bottom: 1.2rem;
        }
        .badge::before {
            content: '';
            width: 6px; height: 6px;
            background: #3b82f6;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        h1 { font-size: 3rem; font-weight: 800; color: #fff; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 0.75rem; }
        h1 span { background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { color: #64748b; font-size: 1rem; line-height: 1.6; }
        .card { background: #fff; border-radius: 20px; padding: 2rem; box-shadow: 0 25px 60px rgba(0,0,0,0.4); }
        .input-group { margin-bottom: 1rem; }
        .input-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input-wrapper svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; width: 18px; height: 18px; }
        input[type="text"] {
            width: 100%;
            padding: 14px 14px 14px 42px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #111827;
            background: #f9fafb;
            transition: all 0.2s;
            outline: none;
        }
        input[type="text"]:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
        input[type="text"]::placeholder { color: #9ca3af; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 1.25rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
        .divider span { font-size: 12px; color: #9ca3af; font-weight: 500; white-space: nowrap; }
        .custom-code-section { background: #f8faff; border: 1px dashed #bfdbfe; border-radius: 12px; padding: 1rem; margin-bottom: 1.25rem; }
        .custom-code-label { font-size: 12px; font-weight: 600; color: #3b82f6; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .custom-code-label::before { content: '✦'; font-size: 10px; }
        .custom-input-wrapper { display: flex; align-items: center; background: #fff; border: 2px solid #e5e7eb; border-radius: 10px; overflow: hidden; transition: all 0.2s; }
        .custom-input-wrapper:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
        .url-prefix { background: #f1f5f9; padding: 12px; font-size: 13px; color: #64748b; font-weight: 500; white-space: nowrap; border-right: 2px solid #e5e7eb; }
        .custom-input-wrapper input { border: none; background: transparent; padding: 12px; font-size: 14px; font-family: 'Inter', sans-serif; color: #111827; outline: none; width: 100%; box-shadow: none; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; letter-spacing: 0.01em; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59,130,246,0.4); }
        .btn:active { transform: translateY(0); }
        .result-card { margin-top: 1.5rem; background: linear-gradient(135deg, #0f172a, #1e1b4b); border-radius: 16px; padding: 1.5rem; border: 1px solid rgba(99,102,241,0.3); display: none; }
        .result-card.visible { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
        .result-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .result-title { font-size: 13px; font-weight: 600; color: #10b981; text-transform: uppercase; letter-spacing: 0.06em; }
        .result-link { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 16px; gap: 12px; }
        .result-url { font-size: 16px; font-weight: 700; color: #fff; font-family: 'Inter', sans-serif; word-break: break-all; }
        .result-url .prefix { color: #64748b; font-weight: 400; font-size: 14px; }
        .result-url .code { color: #fff; font-weight: 800; }
        .copy-btn { background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.4); color: #60a5fa; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap; transition: all 0.2s; }
        .copy-btn:hover { background: rgba(59,130,246,0.35); }
        .result-meta { display: flex; gap: 1rem; margin-top: 1rem; }
        .meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #64748b; }
        .meta-item span { color: #94a3b8; }
        .error-card { margin-top: 1rem; background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; padding: 1rem 1.25rem; align-items: center; gap: 10px; display: none; }
        .error-card.visible { display: flex; }
        .error-icon { font-size: 18px; }
        .error-text { font-size: 14px; color: #dc2626; font-weight: 500; }
        .dashboard-link { text-align: center; margin-top: 1.5rem; }
        .dashboard-link a { color: #475569; font-size: 13px; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .dashboard-link a:hover { color: #60a5fa; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="badge">Encurtador de Link</div>
        <h1>Links curtos,<br><span>resultados grandes</span></h1>
        <p class="subtitle">Cole sua URL e gere um link curto em segundos.</p>
    </div>

    <div class="card">
        <form th:action="@{/shortener}" method="post">
            <div class="input-group">
                <label class="input-label">URL longa</label>
                <div class="input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                    </svg>
                    <input type="text" name="originalUrl" placeholder="https://exemplo.com/url-muito-longa..." required />
                </div>
            </div>

            <div class="divider"><span>código personalizado (opcional)</span></div>

            <div class="custom-code-section">
                <div class="custom-code-label">Escolha seu próprio código</div>
                <div class="custom-input-wrapper">
                    <span class="url-prefix">localhost:8080/</span>
                    <input type="text" name="code" placeholder="meu-link" />
                </div>
            </div>

            <button type="submit" class="btn">Encurtar agora →</button>
        </form>

        <!-- RESULTADO -->
        <div class="result-card" th:classappend="${url != null} ? 'visible' : ''">
            <div class="result-header">
                <div class="result-icon">✓</div>
                <div class="result-title">Link gerado com sucesso!</div>
            </div>
            <div class="result-link" th:if="${url != null}">
                <span class="result-url">
                    <span class="prefix">localhost:8080/</span><span class="code" th:text="${url.code}"></span>
                </span>
                <button class="copy-btn" onclick="copyLink(this)"
                        th:attr="data-code=${url.code}">
                    Copiar
                </button>
            </div>
            <div class="result-meta" th:if="${url != null}">
                <div class="meta-item">📅 <span>Criado agora</span></div>
                <div class="meta-item">🔗 <span>0 cliques</span></div>
            </div>
        </div>

        <!-- ERRO -->
        <div class="error-card" th:classappend="${error != null} ? 'visible' : ''">
            <span class="error-icon">⚠️</span>
            <span class="error-text" th:text="${error}"></span>
        </div>
    </div>

    <div class="dashboard-link">
        <a href="/dashboard">Ver todos os meus links →</a>
    </div>
</div>

<script>
    function copyLink(btn) {
        const code = btn.getAttribute('data-code');
        const fullUrl = 'http://localhost:8080/' + code;
        navigator.clipboard.writeText(fullUrl).then(() => {
            btn.textContent = 'Copiado!';
            setTimeout(() => btn.textContent = 'Copiar', 2000);
        });
    }
</script>

</body>
</html>
