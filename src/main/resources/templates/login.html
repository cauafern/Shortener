<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Encurtador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0a0f1e;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            top: -100px; left: -100px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            pointer-events: none;
        }
        .container { width: 100%; max-width: 420px; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 2rem; }
        .logo { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
        .logo span { color: #3b82f6; }
        .subtitle { color: #64748b; font-size: 14px; }
        .card { background: #fff; border-radius: 20px; padding: 2rem; box-shadow: 0 25px 60px rgba(0,0,0,0.4); }
        .card-title { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 0.25rem; }
        .card-subtitle { font-size: 13px; color: #6b7280; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        .input-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #111827;
            background: #f9fafb;
            transition: all 0.2s;
            outline: none;
        }
        input:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
        input::placeholder { color: #9ca3af; }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59,130,246,0.4); }
        .btn:active { transform: translateY(0); }
        .divider { display: flex; align-items: center; gap: 12px; margin: 1.25rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
        .divider span { font-size: 12px; color: #9ca3af; font-weight: 500; }
        .link-text { text-align: center; font-size: 13px; color: #6b7280; }
        .link-text a { color: #3b82f6; font-weight: 600; text-decoration: none; }
        .link-text a:hover { text-decoration: underline; }
        .alert { padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
        .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
        .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Encurta<span>rápido</span></div>
        <p class="subtitle">Bem-vindo de volta!</p>
    </div>

    <div class="card">
        <div class="card-title">Entrar na sua conta</div>
        <div class="card-subtitle">Digite seu email e senha para continuar</div>

        <div class="alert alert-error" th:if="${param.error}">
            ⚠️ Email ou senha incorretos. Tente novamente.
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            ✓ Você saiu com sucesso.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label class="input-label">Email</label>
                <input type="email" name="username" placeholder="seu@email.com" required />
            </div>
            <div class="input-group">
                <label class="input-label">Senha</label>
                <input type="password" name="password" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn">Entrar →</button>
        </form>

        <div class="divider"><span>ou</span></div>

        <div class="link-text">
            Não tem uma conta? <a href="/register">Criar conta grátis</a>
        </div>
    </div>
</div>
</body>
</html>
